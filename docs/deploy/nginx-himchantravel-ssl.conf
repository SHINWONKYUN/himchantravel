# HTTP -> HTTPS (non-www target)
server {
    listen 80;
    listen [::]:80;
    server_name himchantravel.com www.himchantravel.com;
    return 301 https://himchantravel.com$request_uri;
}

# HTTPS www -> HTTPS non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.himchantravel.com;

    ssl_certificate /etc/letsencrypt/live/himchantravel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/himchantravel.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://himchantravel.com$request_uri;
}

# Main HTTPS (non-www)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name himchantravel.com;

    root /var/www/himchantravel/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/himchantravel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/himchantravel.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
