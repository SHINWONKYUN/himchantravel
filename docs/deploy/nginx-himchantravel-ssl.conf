# HTTP -> HTTPS (non-www target)
server {
    listen 80;
    listen [::]:80;
    server_name himchantravel.com www.himchantravel.com;
    return 301 https://himchantravel.com$request_uri;
}

# HTTPS www -> HTTPS non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.himchantravel.com;

    ssl_certificate /etc/letsencrypt/live/himchantravel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/himchantravel.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://himchantravel.com$request_uri;
}

# Main HTTPS (non-www)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name himchantravel.com;

    root /var/www/himchantravel/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/himchantravel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/himchantravel.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # Admin write API: Basic Auth required
    location /api/admin/ {
        auth_basic "himchantravel admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Public API (read-only) → himchantravel-api
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Admin SPA: same index.html, but Basic Auth required
    location /admin {
        auth_basic "himchantravel admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
